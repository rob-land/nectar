    <use xlink:href="#cell" x="81.5" y="34" fill="#f9f06b"/>
    <use xlink:href="#cell" x="29" y="64" fill="#f9f06b"/>
    <use xlink:href="#cell" x="99" y="64" fill="#f9f06b"/>
